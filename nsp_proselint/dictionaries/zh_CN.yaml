version: "0.1.0"
language: "zh_CN"

entries:
  # ============================================================
  # Thinking Gestures
  # ============================================================

  - id: "thinking_gesture_drum"
    category: "thinking_gesture"
    type: "full"
    severity: "replace"
    detect: "[右左]?手的?[食中无]?指.*?(?:敲|叩|弹|点).*?(?:桌|台|案)[面案上子]?[^，。！？；、]*"
    replacements:
      - "指尖在桌沿画了个圈"
      - "手掌按住了桌面"
      - "五指在桌上收拢又松开"
    test_cases:
      - input: "手指轻轻敲了敲桌面"
        valid_outputs:
          - "指尖在桌沿画了个圈"
          - "手掌按住了桌面"
          - "五指在桌上收拢又松开"
      - input: "手指叩了叩桌案"
        valid_outputs:
          - "指尖在桌沿画了个圈"
          - "手掌按住了桌面"
          - "五指在桌上收拢又松开"
    negative_cases:
      - "他用手指指向远方"
      - "她把桌面擦干净了"
    notes: "Matches stereotypical finger-drumming-on-table indicating thought"

  - id: "thinking_gesture_cup"
    category: "thinking_gesture"
    type: "full"
    severity: "replace"
    detect: "(?:修长的)?手指.*?(?:摩挲|把玩|转动|抚摸).*?(?:杯[沿壁子]?|盏|茶碗|酒杯|棋子|玉佩)[^，。！？；、]*"
    replacements:
      - "手指停了下来"
      - "手上的动作顿了顿"
      - "手指收了回去"
    test_cases:
      - input: "修长的手指摩挲着杯沿"
        valid_outputs:
          - "手指停了下来"
          - "手上的动作顿了顿"
          - "手指收了回去"
      - input: "手指把玩着棋子"
        valid_outputs:
          - "手指停了下来"
          - "手上的动作顿了顿"
          - "手指收了回去"
    negative_cases:
      - "她拿起杯子喝了一口"
      - "他把棋子放在了棋盘上"
    notes: "Replacements use hand/finger nouns only, avoiding specific object references since detect matches multiple objects"

  # ============================================================
  # Generic Posture
  # ============================================================

  - id: "generic_posture_arms"
    category: "generic_posture"
    type: "full"
    severity: "replace"
    detect: "双手(?:交叉|抱|环).*?(?:胸前|胸口)[^，。！？；、]*"
    replacements:
      - "两手撑在桌上"
      - "一手搭在椅背上"
      - "两手插进袖子里"
    test_cases:
      - input: "双手交叉在胸前"
        valid_outputs:
          - "两手撑在桌上"
          - "一手搭在椅背上"
          - "两手插进袖子里"
      - input: "双手环抱在胸口"
        valid_outputs:
          - "两手撑在桌上"
          - "一手搭在椅背上"
          - "两手插进袖子里"
    negative_cases:
      - "双手合十表示感谢"
      - "他把双手放在膝盖上"

  # ============================================================
  # Facial Expressions
  # ============================================================

  - id: "generic_smile"
    category: "generic_smile"
    type: "full"
    severity: "replace"
    detect: "嘴角.*?(?:微微|轻轻|缓缓)?(?:上扬|勾起|翘起|扬起|弯起)[^，。！？；、]*"
    replacements:
      - "嘴唇弯了弯"
      - "脸上露出点笑意"
      - "表情松了松"
      - "笑意从眼底漫出来"
      - "脸上柔和了几分"
    test_cases:
      - input: "嘴角微微上扬"
        valid_outputs:
          - "嘴唇弯了弯"
          - "脸上露出点笑意"
          - "表情松了松"
          - "笑意从眼底漫出来"
          - "脸上柔和了几分"
      - input: "嘴角轻轻勾起一抹弧度"
        valid_outputs:
          - "嘴唇弯了弯"
          - "脸上露出点笑意"
          - "表情松了松"
          - "笑意从眼底漫出来"
          - "脸上柔和了几分"
    negative_cases:
      - "她低着头不说话"
      - "他张开嘴说了句话"
    notes: "Replacements use noun phrases compatible with possessive prefix (X的嘴唇弯了弯)"

  - id: "generic_brow"
    category: "generic_brow"
    type: "full"
    severity: "replace"
    detect: "眉[头梢].*?(?:微微|轻轻|不易察觉地)?(?:蹙起|皱起|蹙了蹙|皱了皱|一挑|上挑)[^，。！？；、]*"
    replacements:
      - "脸色沉了沉"
      - "表情收紧了"
      - "额头现出几道纹路"
      - "神情变了变"
      - "面上多了几分不耐"
    test_cases:
      - input: "眉头微微蹙起"
        valid_outputs:
          - "脸色沉了沉"
          - "表情收紧了"
          - "额头现出几道纹路"
          - "神情变了变"
          - "面上多了几分不耐"
      - input: "眉梢轻轻一挑"
        valid_outputs:
          - "脸色沉了沉"
          - "表情收紧了"
          - "额头现出几道纹路"
          - "神情变了变"
          - "面上多了几分不耐"
    negative_cases:
      - "她画了画眉毛"
      - "他的眉毛很浓"
    notes: "Regex uses compound verbs to match full forms like 蹙起, 皱了皱"

  # ============================================================
  # Emotion Flash
  # ============================================================

  - id: "emotion_flash"
    category: "emotion_flash"
    type: "prefix"
    severity: "replace"
    suffix_type: "emotion_word"
    detect: "眼[中底里神].*?闪过一[丝抹道缕]"
    replacements:
      - "目光中多了几分"
      - "眼里有了一点"
      - "带着几分"
      - "透出一种"
      - "流露出些许"
    test_cases:
      - input: "眼中闪过一丝坚定"
        suffix: "坚定"
        valid_outputs:
          - "目光中多了几分坚定"
          - "眼里有了一点坚定"
          - "带着几分坚定"
          - "透出一种坚定"
          - "流露出些许坚定"
      - input: "眼神里闪过一抹复杂"
        suffix: "复杂"
        valid_outputs:
          - "目光中多了几分复杂"
          - "眼里有了一点复杂"
          - "带着几分复杂"
          - "透出一种复杂"
          - "流露出些许复杂"
      - input: "眼底闪过一缕哀伤"
        suffix: "哀伤"
        valid_outputs:
          - "目光中多了几分哀伤"
          - "眼里有了一点哀伤"
          - "带着几分哀伤"
          - "透出一种哀伤"
          - "流露出些许哀伤"
    negative_cases:
      - "他的眼睛闪闪发光"
      - "眼前闪过一道白光"

  - id: "emotion_flash_flicker"
    category: "emotion_flash"
    type: "full"
    severity: "replace"
    detect: "目光.*?(?:微微|不易察觉地)?(?:闪烁|闪动|一闪)[^，。！？；、]*"
    replacements:
      - "目光定了定"
      - "视线停了一下"
      - "眼神晃了晃"
    test_cases:
      - input: "目光微微闪烁"
        valid_outputs:
          - "目光定了定"
          - "视线停了一下"
          - "眼神晃了晃"
      - input: "目光不易察觉地一闪"
        valid_outputs:
          - "目光定了定"
          - "视线停了一下"
          - "眼神晃了晃"
    negative_cases:
      - "月光闪烁在水面上"
      - "灯光微微闪动"
    notes: "Replacements start with eye/gaze nouns for possessive prefix compatibility"

  # ============================================================
  # Pupil
  # ============================================================

  - id: "pupil_cliche"
    category: "pupil_cliche"
    type: "full"
    severity: "replace"
    detect: "瞳孔.*?(?:微微|猛然)?(?:收缩|一缩|紧缩|放大)[^，。！？；、]*"
    replacements:
      - "神色微变"
      - "表情一僵"
      - "目光一凛"
    test_cases:
      - input: "瞳孔微微收缩"
        valid_outputs:
          - "神色微变"
          - "表情一僵"
          - "目光一凛"
      - input: "瞳孔猛然放大"
        valid_outputs:
          - "神色微变"
          - "表情一僵"
          - "目光一凛"
    negative_cases:
      - "医生检查了他的瞳孔"
      - "她的瞳孔是深棕色的"
    notes: "Replacements use noun phrases for possessive prefix compatibility (X的神色微变)"

  # ============================================================
  # Inner Feeling
  # ============================================================

  - id: "inner_feeling"
    category: "inner_feeling"
    type: "prefix"
    severity: "replace"
    suffix_type: "abstract_noun"
    detect: "(?:心中|心里|内心).*?(?:涌起|升起|泛起|浮起).*?(?:一股|一阵|一丝)"
    replacements:
      - "隐隐觉出了些"
      - "开始感到了"
      - "胸口浮起一点"
      - "慢慢察觉到了"
      - "有了一种说不上来的"
    test_cases:
      - input: "心中涌起一股暖意"
        suffix: "暖意"
        valid_outputs:
          - "隐隐觉出了些暖意"
          - "开始感到了暖意"
          - "胸口浮起一点暖意"
          - "慢慢察觉到了暖意"
          - "有了一种说不上来的暖意"
      - input: "内心升起一丝不安"
        suffix: "不安"
        valid_outputs:
          - "隐隐觉出了些不安"
          - "开始感到了不安"
          - "胸口浮起一点不安"
          - "慢慢察觉到了不安"
          - "有了一种说不上来的不安"
    negative_cases:
      - "心中有了答案"
      - "她的内心很平静"

  # ============================================================
  # Auto Action (Modifier)
  # ============================================================

  - id: "auto_action"
    category: "auto_action"
    type: "modifier"
    severity: "replace"
    detect: "(?:不自觉|不由自主|下意识)地"
    replacements:
      - "本能地"
      - "无意识地"
      - "反射性地"
    test_cases:
      - input: "他不自觉地后退了一步"
        valid_outputs:
          - "他本能地后退了一步"
          - "他无意识地后退了一步"
          - "他反射性地后退了一步"
      - input: "她不由自主地攥紧了衣角"
        valid_outputs:
          - "她本能地攥紧了衣角"
          - "她无意识地攥紧了衣角"
          - "她反射性地攥紧了衣角"
      - input: "众人下意识地屏住了呼吸"
        valid_outputs:
          - "众人本能地屏住了呼吸"
          - "众人无意识地屏住了呼吸"
          - "众人反射性地屏住了呼吸"
    negative_cases:
      - "他有意识地做出了选择"
      - "她自觉地收拾了房间"
    notes: "Modifier-only: surrounding subject/verb/object all preserved"

  # ============================================================
  # Poetic Filler
  # ============================================================

  - id: "poetic_filler"
    category: "poetic_filler"
    type: "full"
    severity: "replace"
    detect: "仿佛.*?(?:在|要).*?(?:诉说|倾诉|传达)[^，。！？；、]*"
    replacements:
      - "仿佛藏着什么不愿说的事"
      - "仿佛有话要讲却咽了回去"
      - "仿佛指向某个遥远的地方"
    test_cases:
      - input: "仿佛在诉说着什么深沉的往事"
        valid_outputs:
          - "仿佛藏着什么不愿说的事"
          - "仿佛有话要讲却咽了回去"
          - "仿佛指向某个遥远的地方"
      - input: "仿佛要传达什么"
        valid_outputs:
          - "仿佛藏着什么不愿说的事"
          - "仿佛有话要讲却咽了回去"
          - "仿佛指向某个遥远的地方"
    negative_cases:
      - "她向朋友诉说了自己的遭遇"
      - "他在文章中传达了重要的信息"
    notes: "Replacements keep 仿佛 prefix to match the adverbial clause slot of the original"

  # ============================================================
  # Vague Emotion
  # ============================================================

  - id: "vague_emotion"
    category: "vague_emotion"
    type: "prefix"
    severity: "replace"
    suffix_type: "abstract_noun"
    detect: "一种难以言喻的"
    replacements:
      - "说不清的"
      - "从没体验过的"
      - "陌生的"
    test_cases:
      - input: "一种难以言喻的压迫感"
        suffix: "压迫感"
        valid_outputs:
          - "说不清的压迫感"
          - "从没体验过的压迫感"
          - "陌生的压迫感"
      - input: "一种难以言喻的感觉"
        suffix: "感觉"
        valid_outputs:
          - "说不清的感觉"
          - "从没体验过的感觉"
          - "陌生的感觉"
    negative_cases:
      - "这种感觉很难描述"
      - "他说不出那是什么"

  # ============================================================
  # Atmosphere
  # ============================================================

  - id: "frozen_air"
    category: "frozen_air"
    type: "full"
    severity: "replace"
    detect: "空气.*?(?:仿佛|似乎|好像).*?(?:凝固|凝结|静止|冻结)[^，。！？；、]*"
    replacements:
      - "空气沉了下来"
      - "四下里静得发闷"
      - "空气变得黏稠起来"
    test_cases:
      - input: "空气仿佛凝固了"
        valid_outputs:
          - "空气沉了下来"
          - "四下里静得发闷"
          - "空气变得黏稠起来"
      - input: "空气似乎都凝结了一般"
        valid_outputs:
          - "空气沉了下来"
          - "四下里静得发闷"
          - "空气变得黏稠起来"
    negative_cases:
      - "冬天的空气很冷"
      - "凝固的冰块开始融化"

  - id: "spreading_silence"
    category: "spreading_silence"
    type: "full"
    severity: "replace"
    detect: "沉默(?:在[^，。！？；、]*?)?(?:蔓延|弥漫|笼罩)[^，。！？；、]*"
    replacements:
      - "沉默拖得越来越长"
      - "安静变得有些难熬"
      - "沉默压在头顶上"
    test_cases:
      - input: "沉默蔓延开来"
        valid_outputs:
          - "沉默拖得越来越长"
          - "安静变得有些难熬"
          - "沉默压在头顶上"
      - input: "沉默弥漫了整个房间"
        valid_outputs:
          - "沉默拖得越来越长"
          - "安静变得有些难熬"
          - "沉默压在头顶上"
    negative_cases:
      - "他选择了沉默"
      - "沉默是金"

  - id: "atmosphere_shift"
    category: "atmosphere_shift"
    type: "full"
    severity: "replace"
    detect: "气氛.*?(?:变得|陡然|瞬间).*?(?:微妙|紧张|凝重)[^，。！？；、]*"
    replacements:
      - "气氛绷了起来"
      - "场面一时有些僵"
      - "空气里多了股压迫感"
    test_cases:
      - input: "气氛变得微妙起来"
        valid_outputs:
          - "气氛绷了起来"
          - "场面一时有些僵"
          - "空气里多了股压迫感"
      - input: "气氛陡然变得凝重"
        valid_outputs:
          - "气氛绷了起来"
          - "场面一时有些僵"
          - "空气里多了股压迫感"
    negative_cases:
      - "聚会的气氛很好"
      - "春天的气氛"

  # ============================================================
  # Physical Cliches
  # ============================================================

  - id: "spine_chill"
    category: "spine_chill"
    type: "full"
    severity: "replace"
    detect: "(?:一股|一阵).*?(?:寒意|凉意).*?(?:从|沿).*?(?:脊背|脊椎|后背|尾椎).*?(?:升起|蔓延|窜上)[^，。！？；、]*"
    replacements:
      - "后背的汗毛竖了起来"
      - "身上起了一层鸡皮疙瘩"
      - "冷汗渗了出来"
    test_cases:
      - input: "一股寒意从脊背升起"
        valid_outputs:
          - "后背的汗毛竖了起来"
          - "身上起了一层鸡皮疙瘩"
          - "冷汗渗了出来"
      - input: "一阵凉意沿着脊椎窜上来"
        valid_outputs:
          - "后背的汗毛竖了起来"
          - "身上起了一层鸡皮疙瘩"
          - "冷汗渗了出来"
    negative_cases:
      - "天气很冷"
      - "他的后背很宽阔"

  - id: "throat_bob"
    category: "throat_bob"
    type: "full"
    severity: "replace"
    detect: "(?:喉结|喉头).*?(?:上下|微微).*?(?:滚动|滑动|一动)[^，。！？；、]*"
    replacements:
      - "脖子上的筋绷了一下"
      - "喉咙发紧"
      - "嗓子像是被什么堵住了"
    test_cases:
      - input: "喉结上下滚动了一下"
        valid_outputs:
          - "脖子上的筋绷了一下"
          - "喉咙发紧"
          - "嗓子像是被什么堵住了"
      - input: "喉头微微一动"
        valid_outputs:
          - "脖子上的筋绷了一下"
          - "喉咙发紧"
          - "嗓子像是被什么堵住了"
    negative_cases:
      - "他清了清嗓子"
      - "喉咙有些干"

  - id: "fist_clench"
    category: "fist_clench"
    type: "full"
    severity: "replace"
    detect: "(?:攥紧|握紧|捏紧)了(?:拳头|拳|双拳)[^，。！？；、]*"
    replacements:
      - "指甲掐进了掌心"
      - "手指收紧了"
      - "手背上青筋凸起"
      - "十指扣在了一起"
      - "两手攥成了铁锤"
    test_cases:
      - input: "攥紧了拳头"
        valid_outputs:
          - "指甲掐进了掌心"
          - "手指收紧了"
          - "手背上青筋凸起"
          - "十指扣在了一起"
          - "两手攥成了铁锤"
      - input: "握紧了双拳"
        valid_outputs:
          - "指甲掐进了掌心"
          - "手指收紧了"
          - "手背上青筋凸起"
          - "十指扣在了一起"
          - "两手攥成了铁锤"
    negative_cases:
      - "他握住了她的手"
      - "紧紧抓住绳子"

  # ============================================================
  # Breath / Physical Reactions
  # ============================================================

  - id: "deep_breath"
    category: "breath_cliche"
    type: "full"
    severity: "replace"
    detect: "深深(?:地)?(?:吸|呼)了(?:一)?口(?:气|长气)[^，。！？；、]*"
    replacements:
      - "胸口起伏了一下"
      - "鼻翼张了张"
      - "停了一拍才开口"
    test_cases:
      - input: "深深吸了一口气"
        valid_outputs:
          - "胸口起伏了一下"
          - "鼻翼张了张"
          - "停了一拍才开口"
      - input: "深深地呼了口长气"
        valid_outputs:
          - "胸口起伏了一下"
          - "鼻翼张了张"
          - "停了一拍才开口"
    negative_cases:
      - "他吸了一口烟"
      - "她深深地看了他一眼"

  - id: "gasp_cold"
    category: "breath_cliche"
    type: "full"
    severity: "replace"
    detect: "(?:不由得|不禁|忍不住)?倒吸了?一口(?:凉|冷)气[^，。！？；、]*"
    replacements:
      - "愣了一下"
      - "气息一滞"
      - "喉咙里发出一声短促的气音"
    test_cases:
      - input: "不由得倒吸了一口凉气"
        valid_outputs:
          - "愣了一下"
          - "气息一滞"
